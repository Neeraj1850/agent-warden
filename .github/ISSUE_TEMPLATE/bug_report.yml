name: Bug Report
description: Report a reproducible AgentWarden bug
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        For exploitable vulnerabilities, do not file a public issue. Follow SECURITY.md instead.
  - type: input
    id: package
    attributes:
      label: Affected package or area
      placeholder: packages/core, apps/api, apps/mcp-server, contracts
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Commands, payloads, or steps to reproduce.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Node version, pnpm version
  - type: textarea
    id: logs
    attributes:
      label: Logs or payload
      render: shell
