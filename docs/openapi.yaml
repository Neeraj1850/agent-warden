openapi: 3.1.0
info:
  title: AgentWarden API
  version: 0.1.0
  summary: Pre-sign EVM transaction security analysis for AI agents.
servers:
  - url: http://localhost:8787
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service status
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - service
                properties:
                  ok:
                    type: boolean
                  service:
                    type: string
  /analyze:
    post:
      summary: Analyze an unsigned EVM transaction before signing
      description: Returns a deterministic security report with an ALLOW, WARN, or BLOCK verdict.
      operationId: analyzeTransaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalysisRequest"
      responses:
        "200":
          description: Security report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecurityReport"
        "400":
          description: Malformed request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Payment required when x402 is enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /analyze-signature:
    post:
      summary: Analyze an off-chain signature request before signing
      description: Returns a deterministic signature security report with an ALLOW, WARN, or BLOCK verdict.
      operationId: analyzeSignature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignatureAnalysisRequest"
      responses:
        "200":
          description: Signature security report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignatureSecurityReport"
        "400":
          description: Malformed request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /explain-report:
    post:
      summary: Explain an existing transaction security report
      description: Returns a non-authoritative explanation without changing deterministic report fields.
      operationId: explainReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExplainReportRequest"
      responses:
        "200":
          description: Report explanation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExplainReportResponse"
        "400":
          description: Malformed request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /reports/{reportHash}:
    get:
      summary: Retrieve a persisted report
      description: Returns a locally persisted transaction or signature report when REPORT_STORE_DIR is configured.
      operationId: getReport
      parameters:
        - name: reportHash
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ReportHash"
      responses:
        "200":
          description: Persisted report
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/SecurityReport"
                  - $ref: "#/components/schemas/SignatureSecurityReport"
        "400":
          description: Malformed report hash
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Report not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /verify-report:
    post:
      summary: Verify a deterministic report hash
      description: Recomputes a report hash from the completed report and original request context.
      operationId: verifyReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyReportRequest"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyReportResponse"
        "400":
          description: Malformed request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    ReportHash:
      type: string
      pattern: "^0x[a-f0-9]{64}$"
    Address:
      type: string
      pattern: "^0x[a-fA-F0-9]{40}$"
    Hex:
      type: string
      pattern: "^0x([a-fA-F0-9]{2})*$"
      maxLength: 131074
      description: 0x-prefixed hex capped at 64 KiB of calldata.
    DecimalString:
      type: string
      pattern: "^\\d+$"
    AnalysisRequest:
      type: object
      required:
        - intent
        - transaction
      properties:
        requestId:
          type: string
        profileId:
          type: string
        policyProfile:
          $ref: "#/components/schemas/PolicyProfile"
        intent:
          $ref: "#/components/schemas/TransactionIntent"
        transaction:
          $ref: "#/components/schemas/UnsignedEvmTransaction"
    SignatureAnalysisRequest:
      type: object
      required:
        - intent
        - payload
      properties:
        requestId:
          type: string
        intent:
          $ref: "#/components/schemas/SignatureIntent"
        payload:
          $ref: "#/components/schemas/SignaturePayload"
    ExplainReportRequest:
      type: object
      required:
        - report
      properties:
        report:
          $ref: "#/components/schemas/SecurityReport"
    ExplainReportResponse:
      type: object
      required:
        - verdict
        - riskScore
        - reportHash
        - model
        - explanation
        - safetyNotice
      properties:
        verdict:
          enum:
            - ALLOW
            - WARN
            - BLOCK
        riskScore:
          type: integer
          minimum: 0
          maximum: 100
        reportHash:
          type: string
          pattern: "^0x[a-f0-9]{64}$"
        model:
          type: string
        explanation:
          type: string
        safetyNotice:
          type: string
    VerifyReportRequest:
      oneOf:
        - type: object
          required:
            - kind
            - request
            - report
          properties:
            kind:
              const: transaction
            request:
              $ref: "#/components/schemas/AnalysisRequest"
            report:
              $ref: "#/components/schemas/SecurityReport"
        - type: object
          required:
            - kind
            - request
            - report
          properties:
            kind:
              const: signature
            request:
              $ref: "#/components/schemas/SignatureAnalysisRequest"
            report:
              $ref: "#/components/schemas/SignatureSecurityReport"
    VerifyReportResponse:
      type: object
      required:
        - valid
        - expectedHash
        - actualHash
      properties:
        valid:
          type: boolean
        expectedHash:
          $ref: "#/components/schemas/ReportHash"
        actualHash:
          $ref: "#/components/schemas/ReportHash"
    SignatureIntent:
      type: object
      required:
        - action
        - chainId
        - from
      properties:
        action:
          enum:
            - login
            - permit
            - authorization
            - unknown
        chainId:
          type: integer
          minimum: 1
        from:
          $ref: "#/components/schemas/Address"
        verifyingContract:
          $ref: "#/components/schemas/Address"
        spender:
          $ref: "#/components/schemas/Address"
        maxAmount:
          $ref: "#/components/schemas/DecimalString"
        description:
          type: string
    SignaturePayload:
      type: object
      required:
        - kind
      properties:
        kind:
          enum:
            - eip712_typed_data
            - personal_sign
            - eth_sign
            - unknown
        typedData:
          type: object
        message:
          type: string
    TransactionIntent:
      type: object
      required:
        - action
        - chainId
        - from
      properties:
        intentId:
          type: string
        action:
          enum:
            - transfer
            - approve
            - contract_call
            - native_transfer
            - token_transfer
            - approval
            - nft_transfer
            - swap
            - multicall
            - deployment
        chainId:
          type: integer
          minimum: 1
        from:
          $ref: "#/components/schemas/Address"
        tokenAddress:
          $ref: "#/components/schemas/Address"
        recipient:
          $ref: "#/components/schemas/Address"
        spender:
          $ref: "#/components/schemas/Address"
        amount:
          $ref: "#/components/schemas/DecimalString"
        maxAmount:
          $ref: "#/components/schemas/DecimalString"
        tokenId:
          $ref: "#/components/schemas/DecimalString"
        allowNativeValue:
          type: boolean
        allowUnlimitedApproval:
          type: boolean
        allowOperatorApproval:
          type: boolean
        allowEip7702Authorization:
          type: boolean
        expectedOutcome:
          $ref: "#/components/schemas/ExpectedTransactionOutcome"
        description:
          type: string
    ExpectedTransactionOutcome:
      type: object
      properties:
        recipients:
          type: array
          items:
            $ref: "#/components/schemas/Address"
        tokenOutflows:
          type: array
          items:
            $ref: "#/components/schemas/ExpectedAssetOutflow"
        nftTransfers:
          type: array
          items:
            $ref: "#/components/schemas/ExpectedNftTransfer"
        approvals:
          type: array
          items:
            $ref: "#/components/schemas/ExpectedApproval"
        allowedSpenders:
          type: array
          items:
            $ref: "#/components/schemas/Address"
        allowedOperators:
          type: array
          items:
            $ref: "#/components/schemas/Address"
        maxNativeValue:
          $ref: "#/components/schemas/DecimalString"
        maxTokenAmounts:
          type: array
          items:
            $ref: "#/components/schemas/ExpectedTokenAmountLimit"
        allowUnknownLogs:
          type: boolean
    ExpectedAssetOutflow:
      type: object
      properties:
        assetStandard:
          enum:
            - native
            - erc20
            - erc721
            - erc1155
            - unknown
        tokenAddress:
          $ref: "#/components/schemas/Address"
        recipient:
          $ref: "#/components/schemas/Address"
        amount:
          $ref: "#/components/schemas/DecimalString"
        maxAmount:
          $ref: "#/components/schemas/DecimalString"
        tokenId:
          $ref: "#/components/schemas/DecimalString"
    ExpectedNftTransfer:
      type: object
      properties:
        standard:
          enum:
            - erc721
            - erc1155
        tokenAddress:
          $ref: "#/components/schemas/Address"
        recipient:
          $ref: "#/components/schemas/Address"
        tokenId:
          $ref: "#/components/schemas/DecimalString"
        amount:
          $ref: "#/components/schemas/DecimalString"
    ExpectedApproval:
      type: object
      properties:
        standard:
          enum:
            - erc20
            - erc721
            - erc1155
            - unknown
        tokenAddress:
          $ref: "#/components/schemas/Address"
        spender:
          $ref: "#/components/schemas/Address"
        operator:
          $ref: "#/components/schemas/Address"
        amount:
          $ref: "#/components/schemas/DecimalString"
        maxAmount:
          $ref: "#/components/schemas/DecimalString"
        tokenId:
          $ref: "#/components/schemas/DecimalString"
        approved:
          type: boolean
    ExpectedTokenAmountLimit:
      type: object
      required:
        - tokenAddress
        - maxAmount
      properties:
        tokenAddress:
          $ref: "#/components/schemas/Address"
        maxAmount:
          $ref: "#/components/schemas/DecimalString"
    PolicyProfile:
      type: object
      required:
        - profileId
        - name
        - mode
      properties:
        profileId:
          type: string
        name:
          type: string
        mode:
          enum:
            - strict
            - balanced
            - permissive-testnet
        allowedChains:
          type: array
          items:
            type: integer
            minimum: 1
        allowedActions:
          type: array
          items:
            enum:
              - transfer
              - approve
              - contract_call
              - native_transfer
              - token_transfer
              - approval
              - nft_transfer
              - swap
              - multicall
              - deployment
        allowedRecipients:
          type: array
          items:
            $ref: "#/components/schemas/Address"
        allowedTokens:
          type: array
          items:
            $ref: "#/components/schemas/Address"
        allowedSpenders:
          type: array
          items:
            $ref: "#/components/schemas/Address"
        allowedOperators:
          type: array
          items:
            $ref: "#/components/schemas/Address"
        allowedRouters:
          type: array
          items:
            $ref: "#/components/schemas/Address"
        maxNativeValue:
          $ref: "#/components/schemas/DecimalString"
        maxTokenAmounts:
          type: array
          items:
            $ref: "#/components/schemas/PolicyProfileTokenLimit"
        blockApprovals:
          type: boolean
        blockOperatorApprovals:
          type: boolean
        blockContractDeployments:
          type: boolean
        blockUnknownContracts:
          type: boolean
        requireSimulation:
          type: boolean
        requireExpectedOutcome:
          type: boolean
        metadata:
          type: object
          additionalProperties:
            type: string
    PolicyProfileTokenLimit:
      type: object
      required:
        - tokenAddress
        - maxAmount
      properties:
        tokenAddress:
          $ref: "#/components/schemas/Address"
        maxAmount:
          $ref: "#/components/schemas/DecimalString"
    UnsignedEvmTransaction:
      type: object
      required:
        - chainId
        - from
        - data
      properties:
        chainId:
          type: integer
          minimum: 1
        from:
          $ref: "#/components/schemas/Address"
        to:
          $ref: "#/components/schemas/Address"
        value:
          $ref: "#/components/schemas/DecimalString"
        data:
          $ref: "#/components/schemas/Hex"
        type:
          oneOf:
            - type: integer
            - type: string
        accessList:
          type: array
          items: {}
        authorizationList:
          type: array
          items: {}
        blobVersionedHashes:
          type: array
          items:
            $ref: "#/components/schemas/Hex"
        maxFeePerBlobGas:
          $ref: "#/components/schemas/DecimalString"
    SecurityReport:
      type: object
      required:
        - verdict
        - riskScore
        - summary
        - explanation
        - findings
        - recommendedAction
        - transactionEnvelope
        - actionType
        - executionGraph
        - decodedActions
        - assetDeltas
        - approvalFindings
        - decodedTransaction
        - policyViolations
        - simulationResult
        - reportHash
      properties:
        requestId:
          type: string
        verdict:
          enum:
            - ALLOW
            - WARN
            - BLOCK
        riskScore:
          type: integer
          minimum: 0
          maximum: 100
        riskVector:
          $ref: "#/components/schemas/RiskVector"
        summary:
          type: string
        explanation:
          type: string
        findings:
          type: array
          items:
            type: object
        recommendedAction:
          type: string
        transactionEnvelope:
          type: object
        actionType:
          type: string
        executionGraph:
          $ref: "#/components/schemas/ExecutionGraph"
        decodedActions:
          type: array
          items:
            type: object
        assetDeltas:
          type: array
          items:
            type: object
        approvalFindings:
          type: array
          items:
            type: object
        benchmarkProfile:
          enum:
            - agentkit
            - goat
            - eliza
            - generic
        decodedTransaction:
          type: object
        policyViolations:
          type: array
          items:
            type: object
        simulationResult:
          type: object
        stateSnapshot:
          $ref: "#/components/schemas/ChainStateSnapshot"
        stateFindings:
          type: array
          items:
            type: object
        saferAlternative:
          type: string
        reportHash:
          type: string
          pattern: "^0x[a-f0-9]{64}$"
    SignatureSecurityReport:
      type: object
      required:
        - verdict
        - riskScore
        - actionType
        - decodedSignature
        - policyViolations
        - reportHash
      properties:
        requestId:
          type: string
        verdict:
          enum:
            - ALLOW
            - WARN
            - BLOCK
        riskScore:
          type: integer
          minimum: 0
          maximum: 100
        actionType:
          type: string
        decodedSignature:
          type: object
        policyViolations:
          type: array
          items:
            type: object
        saferAlternative:
          type: string
        reportHash:
          type: string
          pattern: "^0x[a-f0-9]{64}$"
    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string
    RiskVector:
      type: object
      required:
        - contractRisk
        - tokenRisk
        - behaviorRisk
        - intentDelta
        - sanctionsRisk
        - simulationRisk
      properties:
        contractRisk:
          type: integer
          minimum: 0
          maximum: 100
        tokenRisk:
          type: integer
          minimum: 0
          maximum: 100
        behaviorRisk:
          type: integer
          minimum: 0
          maximum: 100
        intentDelta:
          type: integer
          minimum: 0
          maximum: 100
        sanctionsRisk:
          type: integer
          minimum: 0
          maximum: 100
        simulationRisk:
          type: integer
          minimum: 0
          maximum: 100
    ExecutionGraph:
      type: object
      required:
        - rootNodeId
        - nodes
        - edges
        - maxDepth
        - hasNestedExecution
        - hasUnknownNode
      properties:
        rootNodeId:
          type: string
        nodes:
          type: array
          items:
            type: object
            required:
              - id
              - depth
              - kind
              - actionType
              - functionName
              - selector
              - warnings
              - evidence
            properties:
              id:
                type: string
              parentId:
                type: string
              depth:
                type: integer
                minimum: 0
              kind:
                enum:
                  - root
                  - nested_call
                  - multicall_child
                  - user_operation_hint
              actionType:
                type: string
              functionName:
                type: string
              selector:
                $ref: "#/components/schemas/Hex"
              evidence:
                type: array
                items:
                  type: string
              warnings:
                type: array
                items:
                  type: string
        edges:
          type: array
          items:
            type: object
            required:
              - from
              - to
              - relationship
            properties:
              from:
                type: string
              to:
                type: string
              relationship:
                enum:
                  - contains
                  - approves
                  - transfers
                  - delegates
                  - executes
                  - unknown
        maxDepth:
          type: integer
          minimum: 0
        hasNestedExecution:
          type: boolean
        hasUnknownNode:
          type: boolean
    ChainStateSnapshot:
      type: object
      required:
        - chainId
        - blockTag
        - account
        - erc20
        - erc721
        - erc1155
        - lookupErrors
      properties:
        chainId:
          type: integer
        blockTag:
          enum:
            - latest
        account:
          type: object
          properties:
            address:
              $ref: "#/components/schemas/Address"
            nativeBalance:
              $ref: "#/components/schemas/DecimalString"
            nonce:
              type: integer
        target:
          type: object
          properties:
            address:
              $ref: "#/components/schemas/Address"
            bytecode:
              $ref: "#/components/schemas/Hex"
            isContract:
              type: boolean
        erc20:
          type: array
          items:
            type: object
        erc721:
          type: array
          items:
            type: object
        erc1155:
          type: array
          items:
            type: object
        lookupErrors:
          type: array
          items:
            type: object
